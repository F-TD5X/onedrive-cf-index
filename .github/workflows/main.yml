name: Deploy

on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@master
      - name: Publish
        uses: cloudflare/wrangler-action@1.3.0
        with:
          wranglerVersion: '1.13.0'
          apiToken: ${{ secrets.CF_API_TOKEN }}
